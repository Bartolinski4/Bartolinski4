<svg viewBox="0 0 800 100" width="800" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4E7FEE">
        <animate attributeName="stop-color" values="#4E7FEE;#8AB4F8;#4E7FEE" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#8AB4F8">
        <animate attributeName="stop-color" values="#8AB4F8;#4E7FEE;#8AB4F8" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <text x="50%" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="url(#gradient)">
    Bartolinski
  </text>
</svg>
